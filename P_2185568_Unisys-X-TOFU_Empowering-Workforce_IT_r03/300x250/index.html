<!doctype html>

<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="ad.size" content="width=300,height=250" />
    <title></title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.13_min.js"></script>
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/splittext_3.14.2_min.js"></script>
    <script type="text/javascript">
      var clickTag = "https://www.unisys.com/";
    </script>
  </head>

  <body onload="init()">
    <div id="main_container">
      <!--start main_container-->
      <div id="main_content" class="hidden">
        <!-- <img src="images/f1.jpg" class="full-width" style="opacity: .5; z-index: 1111;" alt=""> -->

        <div class="background">
            <div class="water water-top"></div>
            <div class="water water-mid"></div>
            <div class="water water-bottom"></div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg">
            <filter id="turbulence-top" x="0" y="0" width="238" height="250" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
                <feTurbulence id="sea-filter-top" type="turbulence" numOctaves="3" seed="2" baseFrequency="0.013 0.04" result="noise"></feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
                <animate xlink:href="#sea-filter-top" attributeName="baseFrequency" dur="5.5s" keyTimes="0;0.33;0.66;1" values="0.013 0.04;0.016 0.048;0.019 0.055;0.013 0.04" repeatCount="indefinite"></animate>
            </filter>
            <filter id="turbulence-mid" x="0" y="0" width="238" height="250" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
                <feTurbulence id="sea-filter-mid" type="turbulence" numOctaves="3" seed="4" baseFrequency="0.01 0.03" result="noise"></feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
                <animate xlink:href="#sea-filter-mid" attributeName="baseFrequency" dur="5.5s" keyTimes="0;0.33;0.66;1" values="0.01 0.03;0.012 0.036;0.014 0.04;0.01 0.03" repeatCount="indefinite"></animate>
            </filter>
            <filter id="turbulence-bottom" x="0" y="0" width="238" height="250" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
                <feTurbulence id="sea-filter-bottom" type="turbulence" numOctaves="2" seed="6" baseFrequency="0.007 0.02" result="noise"></feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
                <animate xlink:href="#sea-filter-bottom" attributeName="baseFrequency" dur="7s" keyTimes="0;0.33;0.66;1" values="0.007 0.02;0.0085 0.024;0.01 0.028;0.007 0.02" repeatCount="indefinite"></animate>
            </filter>
        </svg>

        <!-- <img src="images/bg.jpg" class="bg" alt=""> -->
        <img src="images/man.png" class="man" alt="">

        <img src="images/cta.svg" class="cta" id="cta" alt="">
        <img src="images/logo.svg" class="logo" alt="">
        <div class="copy">IT that helps<br>your team<br>make<br>waves.</div>
      </div>

      <div id="default_exit" class="btn"></div>
      <!--end main_container-->
    </div>
    <script type="text/javascript" src="main.js"></script>

    <script type="text/javascript">
      document
        .getElementById("default_exit")
        .addEventListener("click", function () {
          window.open(clickTag, "_blank");
        });
    </script>
  </body>
</html>
