<!doctype html>

<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="ad.size" content="width=300,height=250" />
    <title></title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.13_min.js"></script>
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/splittext_3.14.2_min.js"></script>
    <script type="text/javascript">
      var clickTag = "https://www.unisys.com/";
    </script>
  </head>

  <body onload="init()">
    <div id="main_container">
      <!--start main_container-->
      <div id="main_content" class="hidden">
        <!-- <img src="images/f1.jpg" class="full-width" style="opacity: .5; z-index: 1111;" alt=""> -->

        <div class="background">
            <div class="water"></div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg">
            <filter id="turbulence" x="0" y="0" width="238" height="200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
                <feTurbulence id="sea-filter" type="turbulence" numOctaves="3" seed="2" baseFrequency="0.011 0.035" result="noise"></feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
                <animate xlink:href="#sea-filter" attributeName="baseFrequency" dur="6s" keyTimes="0;0.33;0.66;1" values="0.011 0.035;0.013 0.04;0.015 0.045;0.017 0.05" repeatCount="indefinite"></animate>
            </filter>
        </svg>

        <!-- <img src="images/bg.jpg" class="bg" alt=""> -->
        <img src="images/man.png" class="man" alt="">

        <img src="images/cta.svg" class="cta" id="cta" alt="">
        <img src="images/logo.svg" class="logo" alt="">
        <div class="copy">IT that helps<br>your team<br>make<br>waves.</div>
      </div>

      <div id="default_exit" class="btn"></div>
      <!--end main_container-->
    </div>
    <script type="text/javascript" src="main.js"></script>

    <script type="text/javascript">
      document
        .getElementById("default_exit")
        .addEventListener("click", function () {
          window.open(clickTag, "_blank");
        });
    </script>
  </body>
</html>
