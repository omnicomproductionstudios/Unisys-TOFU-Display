<!doctype html>

<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="ad.size" content="width=300,height=250" />
    <title></title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.13_min.js"></script>
    <script src="https://s0.2mdn.net/ads/studio/cached_libs/splittext_3.14.2_min.js"></script>
    <script type="text/javascript">
      var clickTag = "https://www.unisys.com/";
    </script>
  </head>

  <body onload="init()">
    <div id="main_container">
      <!-- <img src="images/f1.jpg" class="full-width" style="opacity: .5; z-index: 11;" alt=""> -->
      <div id="main_content" class="hidden">
        <img src="images/bg.jpg" class="bg" alt="">
        <img src="images/cta.svg" class="cta" id="cta" alt="">
         <img src="images/logo.svg" class="logo" alt="">
        <div class="copy">Make light<br>work of<br>bright ideas.</div>
      </div>
      <div class="firecracker-image">
        <div class="blast-core"></div>
        <div class="blast-glow"></div>
      </div>
      <div class="banner">
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="sparkle s4"></div>
        <div class="sparkle s5"></div>
        <div class="sparkle s6"></div>
        <div class="sparkle s7"></div>
        <div class="sparkle s8"></div>
        <div class="sparkle s9"></div>
        <div class="sparkle s10"></div>

        <div class="sparkle s11"></div>
        <div class="sparkle s12"></div>
        <div class="sparkle s13"></div>
        <div class="sparkle s14"></div>
        <div class="sparkle s15"></div>
      </div>

      <div id="default_exit" class="btn"></div>
    </div>
    <script type="text/javascript" src="main.js"></script>

    <script type="text/javascript">
      document
        .getElementById("default_exit")
        .addEventListener("click", function () {
          window.open(clickTag, "_blank");
        });
    </script>
  </body>
</html>
